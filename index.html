<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>agendabot-site</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
    
<script 
  defer 
  src="https://agendabot-web.vercel.app/widget.js" 
  data-bot-id="halanmoises">
</script>

<div id="balao-halan-fixo" style="display: none; opacity: 0; position: fixed; bottom: 38px; right: 100px; background: #0f172a; color: white; padding: 10px 16px; border-radius: 14px; font-size: 13px; font-weight: 800; font-family: sans-serif; z-index: 999999; box-shadow: 0 4px 15px rgba(0,0,0,0.3); align-items: center; gap: 10px; transition: opacity 0.5s ease; text-transform: uppercase;">
  Clique para testar 🚀
  <span id="x-fechar" style="cursor: pointer; padding: 2px 6px; background: rgba(255,255,255,0.1); border-radius: 50%; line-height: 1;">&times;</span>
</div>

<style>
  /* Setinha estática (não pesa nada) */
  #balao-halan-fixo::after {
    content: "";
    position: absolute;
    right: -6px;
    top: 50%;
    transform: translateY(-50%);
    border-top: 6px solid transparent;
    border-bottom: 6px solid transparent;
    border-left: 6px solid #0f172a;
  }
  /* Garante que no celular não cubra nada */
  @media (max-width: 600px) { #balao-halan-fixo { display: none !important; } }
</style>

<script>
  // Sem depender do 'load' do sistema, apenas tempo bruto
  setTimeout(function() {
    var b = document.getElementById('balao-halan-fixo');
    if (b) {
      b.style.display = 'flex';
      // Pequeno delay para a transição de opacidade funcionar
      setTimeout(function() { b.style.opacity = '1'; }, 50);
    }
  }, 3000); // Aparece 3 segundos após abrir a página

  // Fecha no X
  document.getElementById('x-fechar').onclick = function(e) {
    e.stopPropagation();
    document.getElementById('balao-halan-fixo').style.display = 'none';
  };

  // Fecha se abrir o chat (identificando pelo clique na área do botão)
  document.addEventListener('mousedown', function(e) {
    if (e.target.closest('div[style*="width: 64px"]') || e.target.closest('svg')) {
      var b = document.getElementById('balao-halan-fixo');
      if (b) b.style.display = 'none';
    }
  });
</script>

  </body>
</html>
