<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    
    <title>MarkeiBot | Tá agendado, tá resolvido.</title>
    
    <meta name="description" content="O bot de agendamento que resolve sua agenda de forma inteligente. Tá agendado, tá resolvido com o MarkeiBot." />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
    
    <script 
      defer 
      src="https://markeibot-web.vercel.app/widget.js" 
      data-bot-id="halanmoises">
    </script>

    <div id="balao-halan-v3" style="display: none; opacity: 0; position: fixed; bottom: 38px; right: 100px; background: #0f172a; color: white; padding: 10px 16px; border-radius: 14px; font-size: 13px; font-weight: 800; font-family: sans-serif; z-index: 999999; box-shadow: 0 4px 15px rgba(0,0,0,0.3); align-items: center; gap: 12px; transition: opacity 0.5s ease; text-transform: uppercase;">
      <span style="white-space: nowrap;">Clique para testar</span>
      <button id="btn-x-redondo" style="
        background: rgba(255,255,255,0.2); 
        border: none; 
        color: white; 
        min-width: 24px; 
        max-width: 24px; 
        height: 24px; 
        border-radius: 50%; 
        display: flex; 
        align-items: center; 
        justify-content: center; 
        cursor: pointer; 
        font-size: 16px; 
        padding: 0; 
        line-height: 0; 
        flex-shrink: 0;
      ">&times;</button>
    </div>

    <style>
      #balao-halan-v3::after {
        content: "";
        position: absolute;
        right: -6px;
        top: 50%;
        transform: translateY(-50%);
        border-top: 6px solid transparent;
        border-bottom: 6px solid transparent;
        border-left: 6px solid #0f172a;
      }

      /* Ajuste Fino para Mobile */
      @media (max-width: 600px) {
        #balao-halan-v3 {
          right: 90px !important;
          bottom: 35px !important;
          font-size: 11px !important;
          padding: 8px 12px !important;
        }
      }
    </style>

    <script>
      setTimeout(function() {
        var b = document.getElementById('balao-halan-v3');
        if (b) {
          b.style.display = 'flex';
          setTimeout(function() { b.style.opacity = '1'; }, 50);
        }
      }, 3000);

      // Fecha no X
      document.getElementById('btn-x-redondo').onclick = function(e) {
        e.stopPropagation();
        document.getElementById('balao-halan-v3').style.display = 'none';
      };

      // Fecha se abrir o chat
      document.addEventListener('mousedown', function(e) {
        if (e.target.closest('div[style*="width: 64px"]') || e.target.closest('svg')) {
          var b = document.getElementById('balao-halan-v3');
          if (b) b.style.display = 'none';
        }
      });
    </script>

  </body>
</html>
